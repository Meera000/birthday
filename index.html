<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Birthday Surprise</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <section id="intro" class="page intro active" aria-label="Intro page">
      <div class="intro-content">
        <h1>For You</h1>
      </div>
    </section>

    <section id="proposal" class="page proposal" aria-label="Question page">
      <div class="card">
        <h2>Will you be mine forever?</h2>
        <div class="buttons">
          <button id="maybeBtn" class="btn btn-maybe">maybe</button>
          <button id="yesBtn" class="btn btn-yes">ofcourse!</button>
        </div>
      </div>
    </section>

    <section id="gifPage" class="page gif-page" aria-label="Celebration page">
      <img src="girl-jump.gif" alt="A joyful jump animation" />
    </section>

    <script src="script.js"></script>
  </body>
</html>
